<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent; overflow: hidden;
      height: 100vh; width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
    }

    #container {
      width: 100vw; height: 100vh; position: relative;
    }

    #drag-zone {
      position: absolute; top: 0; left: 0; right: 0; height: 28px;
      -webkit-app-region: drag; z-index: 50;
    }

    #reader {
      width: 100%; height: 100%; overflow-y: auto; padding: 32px 36px;
      font-size: 17px; line-height: 1.85; user-select: text;
      color: rgba(0,0,0,0.82);
    }
    #reader p { margin-bottom: 0.9em; text-indent: 2em; }
    #reader h1, #reader h2, #reader h3 { text-indent: 0; margin: 1em 0 0.5em; font-weight: 600; }

    #bar {
      position: absolute; top: 0; left: 0; right: 0; height: 38px;
      display: flex; align-items: center; padding: 0 8px; gap: 4px;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; transition: opacity 0.25s; z-index: 100;
      -webkit-app-region: no-drag;
    }
    #bar:hover, #bar.pinned { opacity: 1; }
    #bar button {
      -webkit-app-region: no-drag; background: transparent;
      color: rgba(255,255,255,0.75); border: none; padding: 4px 8px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #bar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #bar .sep { width: 1px; height: 16px; background: rgba(255,255,255,0.12); }
    #bar .info {
      flex: 1; font-size: 11px; color: rgba(255,255,255,0.4);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      pointer-events: none;
    }
    #bar .right { margin-left: auto; display: flex; gap: 2px; }

    #side-panel {
      position: absolute; left: 0; top: 0; bottom: 0; width: 200px;
      background: rgba(30,30,30,0.85); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 90; overflow-y: auto; padding-top: 4px;
      transform: translateX(-100%); transition: transform 0.2s ease;
    }
    #side-panel.open { transform: translateX(0); }
    .sp-item {
      padding: 5px 14px; font-size: 12px; color: rgba(255,255,255,0.55);
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sp-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
    .sp-item.active { color: #fff; background: rgba(255,255,255,0.1); }

    #right-panel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 170px;
      background: rgba(30,30,30,0.85); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 90; overflow-y: auto; padding: 10px;
      transform: translateX(100%); transition: transform 0.2s ease;
    }
    #right-panel.open { transform: translateX(0); }
    .rp-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; margin-top: 10px; }
    .rp-label:first-child { margin-top: 0; }
    .rp-btn {
      display: block; width: 100%; padding: 7px 8px; margin-bottom: 4px;
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75);
      border: none; border-radius: 4px; cursor: pointer; font-size: 12px; text-align: left;
    }
    .rp-btn:hover { background: rgba(255,255,255,0.15); }
    .rp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .rp-row label { font-size: 11px; color: rgba(255,255,255,0.4); min-width: 34px; }
    .rp-row input[type="range"] { flex: 1; height: 4px; }
    .rp-row span { font-size: 11px; color: rgba(255,255,255,0.5); min-width: 28px; text-align: right; }
    .rp-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 4px; border: 1px solid rgba(255,255,255,0.15); }
    .rp-saved-item {
      display: flex; align-items: center; padding: 3px 4px; cursor: pointer;
      border-radius: 3px; margin-bottom: 2px;
    }
    .rp-saved-item:hover { background: rgba(255,255,255,0.08); }
    .rp-saved-item span { font-size: 11px; color: rgba(255,255,255,0.5); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rp-saved-item .del { font-size: 10px; color: rgba(255,255,255,0.2); cursor: pointer; }
    .rp-saved-item .del:hover { color: #e81123; }

    #progress-line {
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: rgba(0,0,0,0.06); z-index: 80;
    }
    #progress-fill { height: 100%; background: rgba(0,0,0,0.25); width: 0; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="container">
    <div id="drag-zone"></div>
    <div id="bar">
      <button id="b-menu" title="章节">☰</button>
      <button id="b-pick" title="取色背景">🎨</button>
      <button id="b-capture" title="截图背景">📷</button>
      <button id="b-settings" title="背景设置">⚙</button>
      <span class="info" id="b-info"></span>
      <button id="b-prev" title="上一章 (Alt+←)">◀</button>
      <button id="b-next" title="下一章 (Alt+→)">▶</button>
      <div class="right">
        <button id="b-pin" title="置顶">📌</button>
        <button id="b-hide" title="隐藏到后台">⏎</button>
        <button id="b-close" title="关闭" style="font-size:14px;">✕</button>
      </div>
    </div>
    <div id="side-panel"></div>
    <div id="right-panel">
      <div class="rp-label">背景</div>
      <button class="rp-btn" id="rp-pick">🎨 取色器选色</button>
      <button class="rp-btn" id="rp-capture">📷 截图做背景</button>
      <button class="rp-btn" id="rp-reset">↩ 恢复默认</button>
      <div class="rp-label">透明度</div>
      <div class="rp-row">
        <input type="range" id="rp-opacity" min="0.05" max="1" step="0.05" value="1">
        <span id="rp-opacity-v">100%</span>
      </div>
      <div class="rp-label">文字大小</div>
      <div class="rp-row">
        <input type="range" id="rp-fontsize" min="12" max="28" step="1" value="17">
        <span id="rp-fontsize-v">17</span>
      </div>
      <div class="rp-label">已保存</div>
      <div id="rp-saved"></div>
    </div>
    <div id="reader"></div>
    <div id="progress-line"><div id="progress-fill"></div></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/chapter.js"></script>
  <script>
    var remote;
    try { remote = require('@electron/remote'); } catch(e) {}

    var FR = {
      _bgColor: null,
      _bgImage: null,
      _opacity: 1.0,
      _fontSize: 17,
      _textColor: 'rgba(0,0,0,0.82)',
      _pinned: true,
      _sideOpen: false,
      _rightOpen: false,
      _barTimer: null,

      init: function() {
        Storage; ChapterManager;
        this._loadSettings();
        this._applyBg();
        this._bindAll();
        this._recvState();
      },

      render: function() {
        var ch = ChapterManager.getCurrentChapter();
        if (!ch) { document.getElementById('reader').innerHTML = '<p style="color:#999;text-align:center;padding-top:40vh;">加载中...</p>'; return; }
        var r = document.getElementById('reader');
        var html = ChapterManager.renderChapterContent(ch);
        if (!html || !html.trim()) { r.innerHTML = '<p style="color:#999;text-align:center;">本章节内容为空</p>'; return; }
        r.innerHTML = html;
        r.scrollTop = 0;
        r.style.fontSize = this._fontSize + 'px';
        r.style.color = this._textColor;
        r.style.opacity = this._opacity;
        this._updateInfo();
        this._updateSidePanel();
        this._saveProgress();
      },

      _applyBg: function() {
        var c = document.getElementById('container');
        if (this._bgImage) {
          c.style.background = 'url(' + this._bgImage + ') center/cover no-repeat';
        } else if (this._bgColor) {
          c.style.background = this._bgColor;
        } else {
          c.style.background = 'rgba(245,245,245,0.88)';
        }
        this._textColor = this._calcText(this._bgColor);
        var r = document.getElementById('reader');
        if (r) r.style.color = this._textColor;
      },

      _calcText: function(hex) {
        if (!hex) return 'rgba(0,0,0,0.82)';
        var c = hex.replace('#', '');
        if (c.length < 6) return 'rgba(0,0,0,0.82)';
        var r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.5 ? 'rgba(0,0,0,0.82)' : 'rgba(255,255,255,0.88)';
      },

      _pickColor: function() {
        if (typeof utools === 'undefined' || !utools.screenColorPick) return;
        utools.screenColorPick(function(c) {
          FR._bgColor = c.hex; FR._bgImage = null;
          FR._applyBg(); FR.render(); FR._saveSettings();
        });
      },

      _captureBg: function() {
        if (typeof utools === 'undefined' || !utools.screenCapture) return;
        utools.screenCapture(function(img) {
          FR._bgImage = img; FR._bgColor = null;
          FR._applyBg(); FR.render(); FR._saveSettings();
        });
      },

      _resetBg: function() {
        this._bgColor = null; this._bgImage = null; this._opacity = 1.0;
        document.getElementById('rp-opacity').value = 1;
        document.getElementById('rp-opacity-v').textContent = '100%';
        this._applyBg(); this.render(); this._saveSettings();
      },

      _updateInfo: function() {
        var el = document.getElementById('b-info');
        var book = ChapterManager.getBook();
        var ch = ChapterManager.getCurrentChapter();
        if (el && book && ch) el.textContent = book.title + ' · ' + ch.title + ' (' + (ch.index+1) + '/' + book.totalChapters + ')';
      },

      _updateSidePanel: function() {
        var p = document.getElementById('side-panel');
        var chs = ChapterManager.getChapterList();
        var ci = ChapterManager.getCurrentIndex();
        var h = '';
        chs.forEach(function(ch) {
          h += '<div class="sp-item' + (ch.index === ci ? ' active' : '') + '" data-i="' + ch.index + '">' + ch.title + '</div>';
        });
        p.innerHTML = h;
      },

      _updateSaved: function() {
        var el = document.getElementById('rp-saved');
        var schemes = Storage.getColorSchemes();
        if (!schemes.length) { el.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.25);">暂无</div>'; return; }
        var h = '';
        schemes.forEach(function(s, i) {
          var bg = s.bgColor ? 'background:'+s.bgColor : 'background:linear-gradient(135deg,#667eea,#764ba2)';
          h += '<div class="rp-saved-item" data-i="'+i+'"><span class="rp-swatch" style="'+bg+'"></span><span>'+(s.name||s.bgColor||'截图')+'</span><span class="del" data-d="'+i+'">✕</span></div>';
        });
        el.innerHTML = h;
      },

      _saveSettings: function() {
        var s = Storage.getSettings();
        s.floatBg = { bgColor: this._bgColor, bgImage: this._bgImage ? 'saved' : null, opacity: this._opacity, fontSize: this._fontSize };
        Storage.saveSettings(s);
      },

      _loadSettings: function() {
        var s = Storage.getSettings();
        if (s.floatBg) {
          this._bgColor = s.floatBg.bgColor || null;
          this._bgImage = s.floatBg.bgImage || null;
          this._opacity = s.floatBg.opacity || 1.0;
          this._fontSize = s.floatBg.fontSize || 17;
        }
        document.getElementById('rp-opacity').value = this._opacity;
        document.getElementById('rp-opacity-v').textContent = Math.round(this._opacity*100)+'%';
        document.getElementById('rp-fontsize').value = this._fontSize;
        document.getElementById('rp-fontsize-v').textContent = this._fontSize;
      },

      _saveProgress: function() {
        var book = ChapterManager.getBook();
        if (!book) return;
        Storage.saveBookProgress(book.filePath, { chapterIndex: ChapterManager.getCurrentIndex(), scrollPosition: 0, timestamp: Date.now() });
        Storage.addRecentBook({ filePath: book.filePath, title: book.title, format: book.format, lastChapter: ChapterManager.getCurrentIndex(), lastRead: Date.now() });
      },

      _showBar: function() {
        document.getElementById('bar').classList.add('pinned');
        clearTimeout(this._barTimer);
        this._barTimer = setTimeout(function() {
          document.getElementById('bar').classList.remove('pinned');
        }, 2500);
      },

      _recvState: function() {
        var ipcRenderer = require('electron').ipcRenderer;
        ipcRenderer.on('reading-state', function(event, state) {
          if (!state || !state.filePath) return;
          var book = null;
          if (state.format === 'epub') {
            if (window.services && window.services.readEpub) book = window.services.readEpub(state.filePath);
          } else {
            if (window.services && window.services.readFile) {
              var content = window.services.readFile(state.filePath);
              if (content) book = Parser.parseFile(state.filePath, content);
            }
          }
          if (book) {
            ChapterManager.load(book);
            var savedProgress = Storage.getBookProgress(state.filePath);
            var chapterIdx = (savedProgress && savedProgress.chapterIndex) || state.chapterIndex || 0;
            var scrollPos = (savedProgress && savedProgress.scrollPosition) || state.scrollPosition || 0;
            ChapterManager.setChapter(chapterIdx);
            FR.render();
            if (scrollPos > 0) {
              var r = document.getElementById('reader');
              if (r) setTimeout(function() { r.scrollTop = scrollPos; }, 150);
            }
          } else {
            document.getElementById('reader').innerHTML = '<p style="color:#c66;text-align:center;padding-top:40vh;">无法加载文件<br><small>' + state.filePath + '</small></p>';
          }
        });
      },

      _bindAll: function() {
        var self = this;

        document.getElementById('reader').addEventListener('mouseover', function() { self._showBar(); });
        document.getElementById('bar').addEventListener('mouseleave', function() {
          clearTimeout(self._barTimer);
          self._barTimer = setTimeout(function() {
            document.getElementById('bar').classList.remove('pinned');
          }, 1200);
        });

        document.getElementById('b-menu').addEventListener('click', function() {
          self._sideOpen = !self._sideOpen;
          document.getElementById('side-panel').classList.toggle('open', self._sideOpen);
          if (self._sideOpen) { self._updateSidePanel(); self._rightOpen = false; document.getElementById('right-panel').classList.remove('open'); }
        });
        document.getElementById('side-panel').addEventListener('click', function(e) {
          var item = e.target.closest('.sp-item');
          if (item) { ChapterManager.setChapter(parseInt(item.dataset.i)); self.render(); }
        });

        document.getElementById('b-pick').addEventListener('click', function() { self._pickColor(); });
        document.getElementById('b-capture').addEventListener('click', function() { self._captureBg(); });
        document.getElementById('b-settings').addEventListener('click', function() {
          self._rightOpen = !self._rightOpen;
          document.getElementById('right-panel').classList.toggle('open', self._rightOpen);
          if (self._rightOpen) { self._updateSaved(); self._sideOpen = false; document.getElementById('side-panel').classList.remove('open'); }
        });

        document.getElementById('rp-pick').addEventListener('click', function() { self._pickColor(); });
        document.getElementById('rp-capture').addEventListener('click', function() { self._captureBg(); });
        document.getElementById('rp-reset').addEventListener('click', function() { self._resetBg(); });
        document.getElementById('rp-opacity').addEventListener('input', function() {
          self._opacity = parseFloat(this.value);
          document.getElementById('rp-opacity-v').textContent = Math.round(self._opacity*100)+'%';
          document.getElementById('reader').style.opacity = self._opacity;
          self._saveSettings();
        });
        document.getElementById('rp-fontsize').addEventListener('input', function() {
          self._fontSize = parseInt(this.value);
          document.getElementById('rp-fontsize-v').textContent = self._fontSize;
          document.getElementById('reader').style.fontSize = self._fontSize + 'px';
          self._saveSettings();
        });

        document.getElementById('rp-saved').addEventListener('click', function(e) {
          if (e.target.classList.contains('del')) {
            var schemes = Storage.getColorSchemes();
            schemes.splice(parseInt(e.target.dataset.d), 1);
            Storage.saveColorSchemes(schemes);
            self._updateSaved();
            return;
          }
          var item = e.target.closest('.rp-saved-item');
          if (item) {
            var s = Storage.getColorSchemes()[parseInt(item.dataset.i)];
            if (s) { self._bgColor = s.bgColor||null; self._bgImage = s.bgImage||null; self._applyBg(); self.render(); self._saveSettings(); }
          }
        });

        document.getElementById('b-prev').addEventListener('click', function() { if (ChapterManager.prevChapter()) self.render(); });
        document.getElementById('b-next').addEventListener('click', function() { if (ChapterManager.nextChapter()) self.render(); });

        document.getElementById('b-pin').addEventListener('click', function() {
          self._pinned = !self._pinned;
          if (remote) remote.getCurrentWindow().setAlwaysOnTop(self._pinned);
          this.textContent = self._pinned ? '📌' : '📍';
        });
        document.getElementById('b-hide').addEventListener('click', function() {
          if (typeof utools !== 'undefined') utools.hideMainWindow();
        });
        document.getElementById('b-close').addEventListener('click', function() {
          utools.sendToParent('close-reader', { chapterIndex: ChapterManager.getCurrentIndex(), scrollPosition: document.getElementById('reader').scrollTop });
          window.close();
        });

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            if (self._sideOpen) { self._sideOpen = false; document.getElementById('side-panel').classList.remove('open'); return; }
            if (self._rightOpen) { self._rightOpen = false; document.getElementById('right-panel').classList.remove('open'); return; }
          }
          if (e.altKey && e.key === 'ArrowLeft') { if (ChapterManager.prevChapter()) self.render(); e.preventDefault(); }
          if (e.altKey && e.key === 'ArrowRight') { if (ChapterManager.nextChapter()) self.render(); e.preventDefault(); }
          if (e.ctrlKey && e.key === '`') { self._pickColor(); e.preventDefault(); }
        });

        document.getElementById('reader').addEventListener('scroll', function() {
          var r = this;
          if (r.scrollHeight <= r.clientHeight) return;
          var pct = r.scrollTop / (r.scrollHeight - r.clientHeight) * 100;
          document.getElementById('progress-fill').style.width = pct + '%';
        });
      }
    };

    document.addEventListener('DOMContentLoaded', function() { FR.init(); });
  </script>
</body>
</html>
