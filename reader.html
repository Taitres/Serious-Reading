<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden; height: 100vh; width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
    }
    #container {
      width: 100vw; height: 100vh; position: relative;
      display: flex; flex-direction: column;
      border-radius: 6px; overflow: hidden;
    }
    #reader {
      flex: 1; overflow-x: auto; overflow-y: hidden; padding: 30px 34px;
      font-size: 17px; line-height: 1.85;
      color: #1a1a1a; min-height: 0; cursor: default;
      white-space: nowrap;
      display: flex;
      scrollbar-width: none;
      -ms-overflow-style: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #reader::-webkit-scrollbar { display: none; }
    #reader .page {
      display: inline-block;
      width: 100%;
      height: 100%;
      vertical-align: top;
      white-space: normal;
      overflow-y: auto;
      padding-right: 20px;
      box-sizing: border-box;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #reader .page::-webkit-scrollbar { display: none; }
    #reader .page p { margin-bottom: 0.9em; text-indent: 2em; word-break: break-word; }
    #reader .page h1, #reader .page h2, #reader .page h3 { text-indent: 0; margin: 1em 0 0.5em; font-weight: 600; }

    #bar {
      position: absolute; top: 0; left: 0; right: 0; height: 36px;
      display: flex; align-items: center; padding: 0 6px; gap: 3px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; transition: opacity 0.2s; z-index: 100;
      user-select: none;
    }
    #bar:hover, #bar.show { opacity: 1; }
    #bar .info { flex:1; font-size:11px; color:rgba(255,255,255,0.35); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none; }

    #pbar { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(0,0,0,0.04); z-index:80; }
    #pfill { height:100%; background:rgba(0,0,0,0.2); width:0; transition:width 0.15s; }
  </style>
</head>
<body>
  <div id="container">
    <div id="bar">
      <span class="info" id="b-info"></span>
    </div>
    <div id="reader"></div>
    <div id="pbar"><div id="pfill"></div></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/chapter.js"></script>
  <script>
    var FR = {
      _bgColor: '#f5f5f5',
      _textColor: '#1a1a1a',
      _opacity: 1.0,
      _fontSize: 17,
      _lineHeight: 1.85,
      _barTimer: null,
      _pendingState: null,
      _hidden: false,

      init: function() {
        document.getElementById('reader').innerHTML = '<p style="color:#1a1a1a;padding:20px;">正在加载...</p>';
        try { this._loadSettings(); } catch(e) {}
        try { this._applyBg(); } catch(e) {}
        try { this._bindAll(); } catch(e) {}
        try { this._recvState(); } catch(e) {}
        setTimeout(function() {
          try {
            if (FR._pendingState) {
              FR._loadBook(FR._pendingState.filePath, FR._pendingState.format);
              FR._pendingState = null;
            } else if (!ChapterManager.getBook()) {
              var h = Storage.getReadingHistory();
              if (h.length > 0) FR._loadBook(h[0].filePath, h[0].format);
            }
          } catch(e) {}
        }, 400);
      },

      _loadBook: function(filePath, format) {
        if (!window.services) {
          document.getElementById('reader').innerHTML = '<p style="text-align:center;padding-top:40vh;color:#c00;">services 未就绪</p>';
          return false;
        }
        var book = null;
        try {
          if (format === 'epub') {
            if (window.services.readEpub) book = window.services.readEpub(filePath);
          } else {
            var content = window.services.readFile(filePath);
            if (content) book = Parser.parseFile(filePath, content);
          }
        } catch(e) {}
        if (!book) {
          document.getElementById('reader').innerHTML = '<p style="text-align:center;padding-top:40vh;color:#c00;">无法加载: ' + filePath + '</p>';
          return false;
        }
        ChapterManager.load(book);
        var saved = Storage.getBookProgress(filePath);
        if (saved && saved.chapterIndex) ChapterManager.setChapter(saved.chapterIndex);
        FR.render();
        if (saved && saved.scrollPosition) {
          var r = document.getElementById('reader');
          if (r) setTimeout(function() { r.scrollLeft = saved.scrollPosition; }, 200);
        }
        return true;
      },

      render: function() {
        var ch = ChapterManager.getCurrentChapter();
        var r = document.getElementById('reader');
        if (!ch) { r.innerHTML = '<p style="text-align:center;padding-top:40vh;color:'+this._textColor+';">无章节内容</p>'; return; }
        var html = ChapterManager.renderChapterContent(ch);
        if (!html || !html.trim()) { r.innerHTML = '<p style="text-align:center;color:'+this._textColor+';">本章节内容为空</p>'; return; }
        r.innerHTML = '<div class="page">' + html + '</div>';
        r.scrollLeft = 0;
        r.style.fontSize = this._fontSize + 'px';
        r.style.lineHeight = this._lineHeight;
        r.style.color = this._textColor;
        r.style.opacity = this._opacity;
        this._updateInfo();
        this._saveProgress();
      },

      _applyBg: function() {
        var c = document.getElementById('container');
        c.style.background = this._bgColor;
      },

      _updateInfo: function() {
        var el = document.getElementById('b-info');
        var book = ChapterManager.getBook();
        var ch = ChapterManager.getCurrentChapter();
        if (el && book && ch) el.textContent = book.title + ' \u00b7 ' + ch.title + ' (' + (ch.index+1) + '/' + book.totalChapters + ')';
      },

      _saveSettings: function() {
        var s = Storage.getSettings();
        s.fr = { bgColor: this._bgColor, textColor: this._textColor, opacity: this._opacity, fontSize: this._fontSize, lineHeight: this._lineHeight };
        Storage.saveSettings(s);
      },

      _loadSettings: function() {
        var s = Storage.getSettings();
        if (s.fr) {
          this._bgColor = s.fr.bgColor || '#f5f5f5';
          this._textColor = s.fr.textColor || '#1a1a1a';
          this._opacity = s.fr.opacity != null ? s.fr.opacity : 1.0;
          this._fontSize = s.fr.fontSize || 17;
          this._lineHeight = s.fr.lineHeight || 1.85;
        }
      },

      _saveProgress: function() {
        var book = ChapterManager.getBook();
        if (!book) return;
        var data = { filePath: book.filePath, chapterIndex: ChapterManager.getCurrentIndex(), scrollPosition: document.getElementById('reader').scrollLeft, timestamp: Date.now() };
        Storage.saveBookProgress(book.filePath, data);
        Storage.addRecentBook({ filePath: book.filePath, title: book.title, format: book.format, lastChapter: ChapterManager.getCurrentIndex(), lastRead: Date.now() });
      },

      _showBar: function() {
        document.getElementById('bar').classList.add('show');
        clearTimeout(this._barTimer);
        this._barTimer = setTimeout(function() { document.getElementById('bar').classList.remove('show'); }, 2500);
      },

      _recvState: function() {
        try {
          var ipcRenderer = window._ipcRenderer;
          if (ipcRenderer) {
            ipcRenderer.on('reading-state', function(event, state) {
              if (!state || !state.filePath) return;
              if (!window.services) { FR._pendingState = state; return; }
              FR._loadBook(state.filePath, state.format);
            });
          }
        } catch(e) {}
      },

      _prevPage: function() {
        var r = document.getElementById('reader');
        var pageWidth = r.clientWidth;
        var currentPage = Math.round(r.scrollLeft / pageWidth);
        if (currentPage > 0) {
          r.scrollLeft = (currentPage - 1) * pageWidth;
        } else {
          if (ChapterManager.prevChapter()) this.render();
        }
      },

      _nextPage: function() {
        var r = document.getElementById('reader');
        var pageWidth = r.clientWidth;
        var currentPage = Math.round(r.scrollLeft / pageWidth);
        var totalPages = Math.ceil(r.scrollWidth / pageWidth);
        if (currentPage < totalPages - 1) {
          r.scrollLeft = (currentPage + 1) * pageWidth;
        } else {
          if (ChapterManager.nextChapter()) this.render();
        }
      },

      _bindAll: function() {
        var self = this;

        document.getElementById('reader').addEventListener('mousemove', function() { self._showBar(); });
        document.getElementById('bar').addEventListener('mouseleave', function() {
          clearTimeout(self._barTimer);
          self._barTimer = setTimeout(function() { document.getElementById('bar').classList.remove('show'); }, 1200);
        });

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            self._hideWindow();
            return;
          }
          if (e.key === 'ArrowLeft') { self._prevPage(); e.preventDefault(); }
          if (e.key === 'ArrowRight') { self._nextPage(); e.preventDefault(); }
        });

        document.getElementById('reader').addEventListener('scroll', function() {
          var r = this;
          if (r.scrollWidth <= r.clientWidth) return;
          var pct = r.scrollLeft / (r.scrollWidth - r.clientWidth) * 100;
          document.getElementById('pfill').style.width = pct + '%';
        });
      },

      _hideWindow: function() {
        if (this._hidden) return;
        this._hidden = true;
        try {
          var remote = require('@electron/remote');
          var win = remote.getCurrentWindow();
          win.hide();
        } catch(e) {
          window.close();
        }
      },

      _showWindow: function() {
        if (!this._hidden) return;
        this._hidden = false;
        try {
          var remote = require('@electron/remote');
          var win = remote.getCurrentWindow();
          win.show();
        } catch(e) {}
      }
    };

    document.addEventListener('DOMContentLoaded', function() { FR.init(); });
  </script>
</body>
</html>
