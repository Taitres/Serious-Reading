<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: rgba(255,255,255,0.01);
      overflow: hidden; height: 100vh; width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Roboto, sans-serif;
    }
    #container {
      width: 100vw; height: 100vh; position: relative;
      background: #f5f5f5;
    }
    #drag-zone {
      position: absolute; top: 0; left: 0; right: 0; height: 24px;
      -webkit-app-region: drag; z-index: 50;
    }
    #reader {
      width: 100%; height: 100%; overflow-y: auto; padding: 30px 34px;
      font-size: 17px; line-height: 1.85; user-select: text;
      color: #1a1a1a;
    }
    #reader p { margin-bottom: 0.9em; text-indent: 2em; word-break: break-word; }
    #reader h1, #reader h2, #reader h3 { text-indent: 0; margin: 1em 0 0.5em; font-weight: 600; }

    #bar {
      position: absolute; top: 0; left: 0; right: 0; height: 36px;
      display: flex; align-items: center; padding: 0 6px; gap: 3px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; transition: opacity 0.2s; z-index: 100;
      -webkit-app-region: no-drag;
    }
    #bar:hover, #bar.show { opacity: 1; }
    #bar button {
      -webkit-app-region: no-drag; background: transparent;
      color: rgba(255,255,255,0.75); border: none; padding: 3px 7px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #bar button:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #bar .info { flex:1; font-size:11px; color:rgba(255,255,255,0.35); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none; }
    #bar .right { margin-left:auto; display:flex; gap:2px; }

    #side {
      position: absolute; left: 0; top: 0; bottom: 0; width: 190px;
      background: rgba(20,20,20,0.88); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 90; overflow-y: auto; padding-top: 2px;
      transform: translateX(-100%); transition: transform 0.18s ease;
    }
    #side.open { transform: translateX(0); }
    .si { padding:5px 12px; font-size:12px; color:rgba(255,255,255,0.5); cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .si:hover { color:rgba(255,255,255,0.9); background:rgba(255,255,255,0.06); }
    .si.active { color:#fff; background:rgba(255,255,255,0.1); }

    #rpanel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 180px;
      background: rgba(20,20,20,0.88); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 90; overflow-y: auto; padding: 10px;
      transform: translateX(100%); transition: transform 0.18s ease;
    }
    #rpanel.open { transform: translateX(0); }
    .rl { font-size:11px; color:rgba(255,255,255,0.35); margin:10px 0 5px; }
    .rl:first-child { margin-top:0; }
    .rb { display:block; width:100%; padding:6px 8px; margin-bottom:3px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); border:none; border-radius:4px; cursor:pointer; font-size:12px; text-align:left; }
    .rb:hover { background:rgba(255,255,255,0.14); }
    .rr { display:flex; align-items:center; gap:5px; margin-bottom:5px; }
    .rr label { font-size:11px; color:rgba(255,255,255,0.35); min-width:42px; }
    .rr input[type="range"] { flex:1; }
    .rr input[type="color"] { width:28px; height:22px; border:1px solid rgba(255,255,255,0.15); border-radius:3px; cursor:pointer; background:transparent; padding:0; }
    .rr span { font-size:11px; color:rgba(255,255,255,0.45); min-width:28px; text-align:right; }

    #pbar { position:absolute; bottom:0; left:0; right:0; height:2px; background:rgba(0,0,0,0.04); z-index:80; }
    #pfill { height:100%; background:rgba(0,0,0,0.2); width:0; transition:width 0.15s; }
  </style>
</head>
<body>
  <div id="container">
    <div id="drag-zone"></div>
    <div id="bar">
      <button id="b-menu">☰</button>
      <button id="b-pick">🎨</button>
      <button id="b-capture">📷</button>
      <button id="b-adj">⚙</button>
      <span class="info" id="b-info"></span>
      <button id="b-prev">◀</button>
      <button id="b-next">▶</button>
      <div class="right">
        <button id="b-pin">📌</button>
        <button id="b-close" style="font-size:14px;">✕</button>
      </div>
    </div>
    <div id="side"></div>
    <div id="rpanel">
      <div class="rl">背景</div>
      <button class="rb" id="rp-pick">🎨 取色器选色</button>
      <button class="rb" id="rp-capture">📷 截图做背景</button>
      <button class="rb" id="rp-reset">↩ 恢复默认</button>
      <div class="rl">背景色(手动)</div>
      <div class="rr">
        <input type="color" id="rp-bgcolor" value="#f5f5f5">
        <span id="rp-bgcolor-v">#f5f5f5</span>
      </div>
      <div class="rl">文字色</div>
      <div class="rr">
        <input type="color" id="rp-textcolor" value="#1a1a1a">
        <span id="rp-textcolor-v">#1a1a1a</span>
      </div>
      <div class="rl">透明度</div>
      <div class="rr">
        <input type="range" id="rp-opacity" min="0.1" max="1" step="0.05" value="1">
        <span id="rp-opacity-v">100%</span>
      </div>
      <div class="rl">字号</div>
      <div class="rr">
        <input type="range" id="rp-fontsize" min="12" max="28" step="1" value="17">
        <span id="rp-fontsize-v">17</span>
      </div>
      <div class="rl">行距</div>
      <div class="rr">
        <input type="range" id="rp-lineheight" min="1.2" max="3.0" step="0.1" value="1.85">
        <span id="rp-lh-v">1.85</span>
      </div>
    </div>
    <div id="reader"></div>
    <div id="pbar"><div id="pfill"></div></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/chapter.js"></script>
  <script>
    var remote;
    try { remote = require('@electron/remote'); } catch(e) {}

    var FR = {
      _bgColor: '#f5f5f5',
      _bgImage: null,
      _textColor: '#1a1a1a',
      _opacity: 1.0,
      _fontSize: 17,
      _lineHeight: 1.85,
      _pinned: true,
      _sideOpen: false,
      _rpOpen: false,
      _barTimer: null,

      init: function() {
        Storage; ChapterManager;
        this._loadSettings();
        this._applyBg();
        this._bindAll();
        this._recvState();
        setTimeout(function() {
          if (!ChapterManager.getBook()) {
            var h = Storage.getReadingHistory();
            if (h.length > 0) {
              FR._loadBook(h[0].filePath, h[0].format);
            }
          }
        }, 400);
      },

      _loadBook: function(filePath, format) {
        var book = null;
        if (format === 'epub') {
          if (window.services && window.services.readEpub) book = window.services.readEpub(filePath);
        } else {
          if (window.services && window.services.readFile) {
            var content = window.services.readFile(filePath);
            if (content) book = Parser.parseFile(filePath, content);
          }
        }
        if (!book) return false;
        ChapterManager.load(book);
        var saved = Storage.getBookProgress(filePath);
        if (saved && saved.chapterIndex) ChapterManager.setChapter(saved.chapterIndex);
        FR.render();
        if (saved && saved.scrollPosition) {
          var r = document.getElementById('reader');
          if (r) setTimeout(function() { r.scrollTop = saved.scrollPosition; }, 200);
        }
        return true;
      },

      render: function() {
        var ch = ChapterManager.getCurrentChapter();
        var r = document.getElementById('reader');
        if (!ch) { r.innerHTML = '<p style="text-align:center;padding-top:40vh;color:' + this._textColor + ';">加载中...</p>'; return; }
        var html = ChapterManager.renderChapterContent(ch);
        if (!html || !html.trim()) { r.innerHTML = '<p style="text-align:center;color:' + this._textColor + ';">本章节内容为空</p>'; return; }
        r.innerHTML = html;
        r.scrollTop = 0;
        r.style.fontSize = this._fontSize + 'px';
        r.style.lineHeight = this._lineHeight;
        r.style.color = this._textColor;
        r.style.opacity = this._opacity;
        this._updateInfo();
        this._updateSide();
        this._saveProgress();
      },

      _applyBg: function() {
        var c = document.getElementById('container');
        if (this._bgImage) {
          c.style.background = 'url(' + this._bgImage + ') center/cover no-repeat';
        } else {
          c.style.background = this._bgColor;
        }
        document.getElementById('rp-bgcolor').value = this._bgColor;
        document.getElementById('rp-bgcolor-v').textContent = this._bgColor;
        document.getElementById('rp-textcolor').value = this._textColor;
        document.getElementById('rp-textcolor-v').textContent = this._textColor;
        var r = document.getElementById('reader');
        if (r) r.style.color = this._textColor;
      },

      _pickColor: function() {
        if (!utools || !utools.screenColorPick) return;
        utools.screenColorPick(function(c) {
          FR._bgColor = c.hex; FR._bgImage = null;
          FR._textColor = FR._autoText(c.hex);
          FR._applyBg(); FR.render(); FR._saveSettings();
        });
      },

      _captureBg: function() {
        if (!utools || !utools.screenCapture) return;
        utools.screenCapture(function(img) {
          FR._bgImage = img; FR._bgColor = '#333';
          FR._textColor = '#ffffff';
          FR._applyBg(); FR.render(); FR._saveSettings();
        });
      },

      _autoText: function(hex) {
        if (!hex) return '#1a1a1a';
        var c = hex.replace('#','');
        if (c.length < 6) return '#1a1a1a';
        var r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
        return (0.299*r + 0.587*g + 0.114*b)/255 > 0.5 ? '#1a1a1a' : '#f0f0f0';
      },

      _resetBg: function() {
        this._bgColor = '#f5f5f5'; this._bgImage = null; this._textColor = '#1a1a1a'; this._opacity = 1.0;
        document.getElementById('rp-opacity').value = 1;
        document.getElementById('rp-opacity-v').textContent = '100%';
        this._applyBg(); this.render(); this._saveSettings();
      },

      _updateInfo: function() {
        var el = document.getElementById('b-info');
        var book = ChapterManager.getBook();
        var ch = ChapterManager.getCurrentChapter();
        if (el && book && ch) el.textContent = book.title + ' · ' + ch.title + ' (' + (ch.index+1) + '/' + book.totalChapters + ')';
      },

      _updateSide: function() {
        var p = document.getElementById('side');
        var chs = ChapterManager.getChapterList();
        var ci = ChapterManager.getCurrentIndex();
        var h = '';
        chs.forEach(function(ch) { h += '<div class="si' + (ch.index===ci?' active':'') + '" data-i="'+ch.index+'">' + ch.title + '</div>'; });
        p.innerHTML = h;
      },

      _saveSettings: function() {
        var s = Storage.getSettings();
        s.fr = { bgColor: this._bgColor, bgImage: this._bgImage ? 'saved' : null, textColor: this._textColor, opacity: this._opacity, fontSize: this._fontSize, lineHeight: this._lineHeight };
        Storage.saveSettings(s);
      },

      _loadSettings: function() {
        var s = Storage.getSettings();
        if (s.fr) {
          this._bgColor = s.fr.bgColor || '#f5f5f5';
          this._bgImage = s.fr.bgImage || null;
          this._textColor = s.fr.textColor || '#1a1a1a';
          this._opacity = s.fr.opacity != null ? s.fr.opacity : 1.0;
          this._fontSize = s.fr.fontSize || 17;
          this._lineHeight = s.fr.lineHeight || 1.85;
        }
        document.getElementById('rp-opacity').value = this._opacity;
        document.getElementById('rp-opacity-v').textContent = Math.round(this._opacity*100)+'%';
        document.getElementById('rp-fontsize').value = this._fontSize;
        document.getElementById('rp-fontsize-v').textContent = this._fontSize;
        document.getElementById('rp-lineheight').value = this._lineHeight;
        document.getElementById('rp-lh-v').textContent = this._lineHeight;
      },

      _saveProgress: function() {
        var book = ChapterManager.getBook();
        if (!book) return;
        Storage.saveBookProgress(book.filePath, { chapterIndex: ChapterManager.getCurrentIndex(), scrollPosition: document.getElementById('reader').scrollTop, timestamp: Date.now() });
        Storage.addRecentBook({ filePath: book.filePath, title: book.title, format: book.format, lastChapter: ChapterManager.getCurrentIndex(), lastRead: Date.now() });
      },

      _showBar: function() {
        document.getElementById('bar').classList.add('show');
        clearTimeout(this._barTimer);
        this._barTimer = setTimeout(function() { document.getElementById('bar').classList.remove('show'); }, 2500);
      },

      _recvState: function() {
        var ipcRenderer = require('electron').ipcRenderer;
        ipcRenderer.on('reading-state', function(event, state) {
          if (!state || !state.filePath) return;
          var ok = FR._loadBook(state.filePath, state.format);
          if (!ok) document.getElementById('reader').innerHTML = '<p style="text-align:center;padding-top:40vh;color:'+FR._textColor+';">无法加载文件</p>';
        });
      },

      _bindAll: function() {
        var self = this;

        document.getElementById('reader').addEventListener('mousemove', function() { self._showBar(); });
        document.getElementById('bar').addEventListener('mouseleave', function() {
          clearTimeout(self._barTimer);
          self._barTimer = setTimeout(function() { document.getElementById('bar').classList.remove('show'); }, 1200);
        });

        document.getElementById('b-menu').addEventListener('click', function() {
          self._sideOpen = !self._sideOpen;
          document.getElementById('side').classList.toggle('open', self._sideOpen);
          if (self._sideOpen) { self._updateSide(); self._rpOpen = false; document.getElementById('rpanel').classList.remove('open'); }
        });
        document.getElementById('side').addEventListener('click', function(e) {
          var item = e.target.closest('.si');
          if (item) { ChapterManager.setChapter(parseInt(item.dataset.i)); self.render(); }
        });

        document.getElementById('b-pick').addEventListener('click', function() { self._pickColor(); });
        document.getElementById('b-capture').addEventListener('click', function() { self._captureBg(); });
        document.getElementById('b-adj').addEventListener('click', function() {
          self._rpOpen = !self._rpOpen;
          document.getElementById('rpanel').classList.toggle('open', self._rpOpen);
          if (self._rpOpen) { self._sideOpen = false; document.getElementById('side').classList.remove('open'); }
        });

        document.getElementById('rp-pick').addEventListener('click', function() { self._pickColor(); });
        document.getElementById('rp-capture').addEventListener('click', function() { self._captureBg(); });
        document.getElementById('rp-reset').addEventListener('click', function() { self._resetBg(); });
        document.getElementById('rp-bgcolor').addEventListener('input', function() {
          self._bgColor = this.value; self._bgImage = null;
          document.getElementById('rp-bgcolor-v').textContent = this.value;
          self._textColor = self._autoText(this.value);
          self._applyBg(); self.render(); self._saveSettings();
        });
        document.getElementById('rp-textcolor').addEventListener('input', function() {
          self._textColor = this.value;
          document.getElementById('rp-textcolor-v').textContent = this.value;
          var r = document.getElementById('reader');
          if (r) r.style.color = self._textColor;
          self._saveSettings();
        });
        document.getElementById('rp-opacity').addEventListener('input', function() {
          self._opacity = parseFloat(this.value);
          document.getElementById('rp-opacity-v').textContent = Math.round(self._opacity*100)+'%';
          document.getElementById('reader').style.opacity = self._opacity;
          self._saveSettings();
        });
        document.getElementById('rp-fontsize').addEventListener('input', function() {
          self._fontSize = parseInt(this.value);
          document.getElementById('rp-fontsize-v').textContent = self._fontSize;
          document.getElementById('reader').style.fontSize = self._fontSize + 'px';
          self._saveSettings();
        });
        document.getElementById('rp-lineheight').addEventListener('input', function() {
          self._lineHeight = parseFloat(this.value);
          document.getElementById('rp-lh-v').textContent = self._lineHeight;
          document.getElementById('reader').style.lineHeight = self._lineHeight;
          self._saveSettings();
        });

        document.getElementById('b-prev').addEventListener('click', function() { if (ChapterManager.prevChapter()) self.render(); });
        document.getElementById('b-next').addEventListener('click', function() { if (ChapterManager.nextChapter()) self.render(); });
        document.getElementById('b-pin').addEventListener('click', function() {
          self._pinned = !self._pinned;
          if (remote) remote.getCurrentWindow().setAlwaysOnTop(self._pinned);
          this.textContent = self._pinned ? '📌' : '📍';
        });
        document.getElementById('b-close').addEventListener('click', function() {
          utools.sendToParent('close-reader', { chapterIndex: ChapterManager.getCurrentIndex(), scrollPosition: document.getElementById('reader').scrollTop });
          window.close();
        });

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            if (self._sideOpen) { self._sideOpen = false; document.getElementById('side').classList.remove('open'); return; }
            if (self._rpOpen) { self._rpOpen = false; document.getElementById('rpanel').classList.remove('open'); return; }
          }
          if (e.altKey && e.key === 'ArrowLeft') { if (ChapterManager.prevChapter()) self.render(); e.preventDefault(); }
          if (e.altKey && e.key === 'ArrowRight') { if (ChapterManager.nextChapter()) self.render(); e.preventDefault(); }
          if (e.ctrlKey && e.key === '`') { self._pickColor(); e.preventDefault(); }
        });

        document.getElementById('reader').addEventListener('scroll', function() {
          var r = this;
          if (r.scrollHeight <= r.clientHeight) return;
          var pct = r.scrollTop / (r.scrollHeight - r.clientHeight) * 100;
          document.getElementById('pfill').style.width = pct + '%';
        });
      }
    };

    document.addEventListener('DOMContentLoaded', function() { FR.init(); });
  </script>
</body>
</html>
