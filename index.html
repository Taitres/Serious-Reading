<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serious Reading</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    body { margin: 0; padding: 0; background: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
    #app { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    h2 { margin: 0 0 8px; font-size: 24px; font-weight: 600; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .actions { display: flex; gap: 10px; margin-bottom: 20px; }
    .actions button { padding: 10px 20px; border: none; border-radius: 6px; background: #333; color: #e0e0e0; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .actions button:hover { background: #444; }
    .actions button.primary { background: #2a6; }
    .actions button.primary:hover { background: #3b7; }
    #recent-list { width: 100%; max-width: 400px; }
    .recent-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #222; border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: background 0.2s; }
    .recent-item:hover { background: #333; }
    .recent-item .title { font-size: 13px; }
    .recent-item .date { font-size: 11px; color: #666; }
    .settings-btn { margin-top: 20px; padding: 8px 16px; background: #333; border: none; border-radius: 6px; color: #888; cursor: pointer; font-size: 13px; }
    .settings-btn:hover { background: #444; color: #aaa; }
    .settings-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .settings-content { background: #222; padding: 24px; border-radius: 8px; width: 400px; max-height: 90vh; overflow-y: auto; }
    .settings-content h3 { margin: 0 0 16px; font-size: 16px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .setting-row label { font-size: 13px; color: #aaa; }
    .setting-row input, .setting-row select { background: #333; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; padding: 4px 8px; font-size: 13px; }
    .preview-box { width: 100%; height: 140px; border-radius: 6px; margin: 12px 0; display: flex; flex-direction: column; border: 1px solid #444; position: relative; overflow: hidden; }
    .preview-box .preview-title { position: absolute; top: 0; left: 0; right: 0; height: 20px; background: rgba(0,0,0,0.3); font-size: 10px; color: rgba(255,255,255,0.5); display: flex; align-items: center; padding: 0 8px; }
    .preview-box .preview-text { flex: 1; padding: 28px 20px 20px; text-indent: 2em; line-height: 1.8; font-size: 13px; overflow: hidden; }
    .setting-actions { display: flex; gap: 8px; margin-top: 16px; }
    .setting-actions button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .setting-actions button.save { background: #2a6; color: #fff; }
    .setting-actions button.close { background: #333; color: #888; }
    .chapter-list { width: 100%; max-width: 400px; margin-top: 20px; }
    .chapter-list h3 { margin: 0 0 8px; font-size: 14px; color: #999; }
    .chapter-item { padding: 8px 12px; background: #222; border-radius: 4px; margin-bottom: 4px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .chapter-item:hover { background: #333; }
    .chapter-item.active { background: #2a6; }
  </style>
</head>
<body>
  <div id="app">
    <h2>Serious Reading</h2>
    <p class="subtitle">隐蔽阅读器</p>
    <div class="actions">
      <button id="btn-open-file" class="primary">打开文件</button>
      <button id="btn-open-url">输入网址</button>
      <button id="btn-continue" style="display:none">继续阅读</button>
    </div>
    <div id="recent-list"></div>
    <div id="chapter-list" class="chapter-list" style="display:none"></div>
    <button class="settings-btn" id="btn-settings">设置</button>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/chapter.js"></script>
  <script>
    window.App = {
      _currentBook: null,

      init: function() {
        this._bindWelcomeActions();
        this._loadRecentList();
        var self = this;
        if (typeof utools !== 'undefined') {
          utools.onPluginEnter(function(action) {
            self._handlePluginEnter(action);
          });
        }
      },

      _handlePluginEnter: function(action) {
        if (action.code === 'reader_open') {
          if (action.type === 'file' && action.payload && action.payload.length > 0) {
            var file = action.payload[0];
            var ext = (file.name || file.path).split('.').pop().toLowerCase();
            this._openBook(file.path, ext);
          }
        } else if (action.code === 'reader_continue') {
          var history = Storage.getReadingHistory();
          if (history.length > 0) {
            this._openBook(history[0].filePath, history[0].format);
          }
        } else {
          this._loadRecentList();
        }
      },

      _openBook: function(filePath, format) {
        var book = null;
        if (format === 'epub') {
          if (window.services && window.services.readEpub) book = window.services.readEpub(filePath);
        } else {
          var content = window.services ? window.services.readFile(filePath) : null;
          if (content) book = Parser.parseFile(filePath, content);
        }
        if (!book) return;
        this._currentBook = book;
        ChapterManager.load(book);
        var saved = Storage.getBookProgress(filePath);
        if (saved && saved.chapterIndex) ChapterManager.setChapter(saved.chapterIndex);
        this._showChapterList();
        this._openReaderWindow(filePath, format, saved);
      },

      _showChapterList: function() {
        var el = document.getElementById('chapter-list');
        if (!el) return;
        var chs = ChapterManager.getChapterList();
        if (chs.length === 0) { el.style.display = 'none'; return; }
        var html = '<h3>章节选择</h3>';
        chs.forEach(function(ch) {
          html += '<div class="chapter-item" data-index="' + ch.index + '">' + ch.title + '</div>';
        });
        el.innerHTML = html;
        el.style.display = 'block';
        var self = this;
        el.querySelectorAll('.chapter-item').forEach(function(item) {
          item.addEventListener('click', function() {
            var idx = parseInt(this.dataset.index);
            ChapterManager.setChapter(idx);
            self._openReaderWindow(self._currentBook.filePath, self._currentBook.format, { chapterIndex: idx, scrollPosition: 0 });
          });
        });
      },

      _openReaderWindow: function(filePath, format, saved) {
        var settings = Storage.getSettings();
        var state = {
          filePath: filePath,
          format: format,
          chapterIndex: saved ? saved.chapterIndex : 0,
          scrollPosition: saved ? saved.scrollPosition : 0,
          settings: settings
        };
        if (window.services && window.services.createReaderWindow) {
          window.services.createReaderWindow(state);
        }
        if (typeof utools !== 'undefined') utools.outPlugin();
      },

      _openUrl: function(url) {
        if (!window.services || !window.services.fetchUrl) return;
        var self = this;
        window.services.fetchUrl(url).then(function(html) {
          var book = Parser.parseOnline(html, url);
          if (book) {
            ChapterManager.load(book);
            self._openReaderWindow(url, 'online', null);
          }
        }).catch(function(err) {
          alert('无法获取网页内容: ' + err.message);
        });
      },

      _bindWelcomeActions: function() {
        var self = this;
        document.getElementById('btn-open-file').addEventListener('click', function() {
          if (typeof utools !== 'undefined' && utools.showOpenDialog) {
            var files = utools.showOpenDialog({
              filters: [{ name: '阅读文件', extensions: ['txt', 'epub', 'md', 'markdown'] }],
              properties: ['openFile']
            });
            if (files && files.length > 0) {
              var ext = files[0].split('.').pop().toLowerCase();
              self._openBook(files[0], ext);
            }
          }
        });
        document.getElementById('btn-open-url').addEventListener('click', function() {
          var url = prompt('请输入网址:');
          if (url && url.trim()) self._openUrl(url.trim());
        });
        var btnContinue = document.getElementById('btn-continue');
        var history = Storage.getReadingHistory();
        if (history.length > 0) {
          btnContinue.style.display = 'inline-block';
          btnContinue.textContent = '继续: ' + history[0].title;
          btnContinue.addEventListener('click', function() {
            self._openBook(history[0].filePath, history[0].format);
          });
        }
        document.getElementById('btn-settings').addEventListener('click', function() {
          self._showSettingsPanel();
        });
      },

      _loadRecentList: function() {
        var el = document.getElementById('recent-list');
        if (!el) return;
        var history = Storage.getReadingHistory();
        if (history.length === 0) return;
        var html = '<h3 style="margin-bottom:8px;font-size:14px;color:#999;">最近阅读</h3>';
        history.slice(0, 8).forEach(function(item) {
          html += '<div class="recent-item" data-path="' + item.filePath + '" data-format="' + item.format + '">';
          html += '<span class="title">' + item.title + '</span>';
          html += '<span class="date">' + new Date(item.lastRead).toLocaleDateString() + '</span>';
          html += '</div>';
        });
        el.innerHTML = html;
        el.querySelectorAll('.recent-item').forEach(function(item) {
          item.addEventListener('click', function() {
            App._openBook(this.dataset.path, this.dataset.format);
          });
        });
      },

      _showSettingsPanel: function() {
        var existing = document.querySelector('.settings-panel');
        if (existing) { existing.remove(); return; }
        var settings = Storage.getSettings();
        var panel = document.createElement('div');
        panel.className = 'settings-panel';
        var fr = settings.fr || {};
        panel.innerHTML =
          '<div class="settings-content">' +
          '<h3>阅读设置</h3>' +
          '<div class="setting-row"><label>默认字体大小</label><input type="range" id="set-fontsize" min="12" max="28" value="' + (fr.fontSize || 17) + '"><span id="set-fontsize-val">' + (fr.fontSize || 17) + '</span></div>' +
          '<div class="setting-row"><label>默认行距</label><input type="range" id="set-lineheight" min="1.2" max="3.0" step="0.1" value="' + (fr.lineHeight || 1.85) + '"><span id="set-lh-val">' + (fr.lineHeight || 1.85) + '</span></div>' +
          '<div class="setting-row"><label>背景色</label><input type="color" id="set-bgcolor" value="' + (fr.bgColor || '#f5f5f5') + '"></div>' +
          '<div class="setting-row"><label>文字色</label><input type="color" id="set-textcolor" value="' + (fr.textColor || '#1a1a1a') + '"></div>' +
          '<div class="setting-row"><label>透明度</label><input type="range" id="set-opacity" min="0.1" max="1" step="0.05" value="' + (fr.opacity || 1) + '"><span id="set-opacity-val">' + Math.round((fr.opacity || 1)*100) + '%</span></div>' +
          '<div class="preview-box" id="preview-box" style="background:' + (fr.bgColor || '#f5f5f5') + ';color:' + (fr.textColor || '#1a1a1a') + ';opacity:' + (fr.opacity || 1) + ';">' +
          '<div class="preview-title">Serious Reading</div>' +
          '<div class="preview-text">这是一段预览文字，用于展示阅读窗口的实际效果。你可以调整背景色、文字色和透明度来预览。</div>' +
          '</div>' +
          '<div class="setting-row"><label>窗口宽度</label><input type="number" id="set-width" min="300" max="1200" step="20" value="' + (settings.floatWidth || 520) + '"></div>' +
          '<div class="setting-row"><label>窗口高度</label><input type="number" id="set-height" min="400" max="1400" step="20" value="' + (settings.floatHeight || 780) + '"></div>' +
          '<div class="setting-row"><label>鼠标离开自动隐藏</label><select id="set-edge"><option value="1500"' + ((settings.edgeHideDelay || 1500) === 1500 ? ' selected' : '') + '>1.5秒</option><option value="3000"' + ((settings.edgeHideDelay || 1500) === 3000 ? ' selected' : '') + '>3秒</option><option value="0"' + (settings.edgeHideDelay === 0 ? ' selected' : '') + '>关闭</option></select></div>' +
          '<div class="setting-row"><label>双击隐藏</label><select id="set-dblclick"><option value="1"' + (settings.dblClickHide !== 0 ? ' selected' : '') + '>开启</option><option value="0"' + (settings.dblClickHide === 0 ? ' selected' : '') + '>关闭</option></select></div>' +
          '<div class="setting-actions"><button class="save" id="set-save">保存</button><button class="close" id="set-close">关闭</button></div>' +
          '</div>';
        document.body.appendChild(panel);

        var updatePreview = function() {
          var bg = document.getElementById('set-bgcolor').value;
          var tc = document.getElementById('set-textcolor').value;
          var op = document.getElementById('set-opacity').value;
          var preview = document.getElementById('preview-box');
          preview.style.background = bg;
          preview.style.color = tc;
          preview.style.opacity = op;
        };

        document.getElementById('set-fontsize').addEventListener('input', function() {
          document.getElementById('set-fontsize-val').textContent = this.value;
        });
        document.getElementById('set-lineheight').addEventListener('input', function() {
          document.getElementById('set-lh-val').textContent = this.value;
        });
        document.getElementById('set-opacity').addEventListener('input', function() {
          document.getElementById('set-opacity-val').textContent = Math.round(parseFloat(this.value)*100) + '%';
          updatePreview();
        });
        document.getElementById('set-bgcolor').addEventListener('input', updatePreview);
        document.getElementById('set-textcolor').addEventListener('input', updatePreview);

        document.getElementById('set-save').addEventListener('click', function() {
          settings.fr = settings.fr || {};
          settings.fr.fontSize = parseInt(document.getElementById('set-fontsize').value);
          settings.fr.lineHeight = parseFloat(document.getElementById('set-lineheight').value);
          settings.fr.bgColor = document.getElementById('set-bgcolor').value;
          settings.fr.textColor = document.getElementById('set-textcolor').value;
          settings.fr.opacity = parseFloat(document.getElementById('set-opacity').value);
          settings.floatWidth = parseInt(document.getElementById('set-width').value);
          settings.floatHeight = parseInt(document.getElementById('set-height').value);
          settings.edgeHideDelay = parseInt(document.getElementById('set-edge').value);
          settings.dblClickHide = parseInt(document.getElementById('set-dblclick').value);
          Storage.saveSettings(settings);
          panel.remove();
        });
        document.getElementById('set-close').addEventListener('click', function() { panel.remove(); });
      }
    };
    document.addEventListener('DOMContentLoaded', function() { App.init(); });
  </script>
</body>
</html>
