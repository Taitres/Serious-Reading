<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serious Reading</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div id="app">
    <div id="welcome" class="view">
      <h2>Serious Reading</h2>
      <p>隐蔽阅读器</p>
      <div class="welcome-actions">
        <button id="btn-open-file">打开文件</button>
        <button id="btn-open-url">输入网址</button>
        <button id="btn-continue" style="display:none">继续阅读</button>
      </div>
      <div id="recent-list"></div>
      <div style="margin-top:20px;">
        <button id="btn-settings" style="background:#444;">设置</button>
      </div>
    </div>
  </div>
  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/chapter.js"></script>
  <script>
    window.App = {
      init: function() {
        Storage; ChapterManager;
        this._bindWelcomeActions();
        this._loadRecentList();
        var self = this;
        if (typeof utools !== 'undefined') {
          utools.onPluginEnter(function(action) {
            self._handlePluginEnter(action);
          });
        }
      },
      _handlePluginEnter: function(action) {
        if (action.code === 'reader_open') {
          if (action.type === 'file' && action.payload && action.payload.length > 0) {
            var file = action.payload[0];
            var ext = (file.name || file.path).split('.').pop().toLowerCase();
            this._openBook(file.path, ext);
          }
        } else if (action.code === 'reader_continue') {
          var history = Storage.getReadingHistory();
          if (history.length > 0) {
            this._openBook(history[0].filePath, history[0].format);
          }
        } else {
          this._loadRecentList();
        }
      },
      _openBook: function(filePath, format) {
        var book = null;
        if (format === 'epub') {
          if (window.services && window.services.readEpub) book = window.services.readEpub(filePath);
        } else {
          var content = window.services ? window.services.readFile(filePath) : null;
          if (content) book = Parser.parseFile(filePath, content);
        }
        if (!book) return;
        ChapterManager.load(book);
        var saved = Storage.getBookProgress(filePath);
        if (saved && saved.chapterIndex) ChapterManager.setChapter(saved.chapterIndex);
        this._openFloatingWindow(filePath, format, saved);
      },
      _openFloatingWindow: function(filePath, format, saved) {
        if (typeof utools === 'undefined' || !utools.createBrowserWindow) return;
        var settings = Storage.getSettings();
        var state = {
          filePath: filePath,
          format: format,
          chapterIndex: saved ? saved.chapterIndex : 0,
          scrollPosition: saved ? saved.scrollPosition : 0
        };
        var win = utools.createBrowserWindow(
          'reader.html',
          {
            width: settings.floatWidth || 520,
            height: settings.floatHeight || 780,
            title: '',
            transparent: true,
            frame: false,
            alwaysOnTop: true,
            resizable: true,
            backgroundColor: '#02fafafa',
            skipTaskbar: true,
            hasShadow: false,
            thickFrame: false,
            webPreferences: {
              preload: 'reader_preload.js'
            }
          },
          function() {
            win.webContents.send('reading-state', state);
            try { win.setAlwaysOnTop(true, 'screen-saver'); } catch(e) {}
          }
        );
        utools.outPlugin();
      },
      _openUrl: function(url) {
        if (!window.services || !window.services.fetchUrl) return;
        var self = this;
        window.services.fetchUrl(url).then(function(html) {
          var book = Parser.parseOnline(html, url);
          if (book) {
            ChapterManager.load(book);
            self._openFloatingWindow(url, 'online', null);
          }
        }).catch(function(err) {
          alert('无法获取网页内容: ' + err.message);
        });
      },
      _bindWelcomeActions: function() {
        var self = this;
        document.getElementById('btn-open-file').addEventListener('click', function() {
          if (typeof utools !== 'undefined' && utools.showOpenDialog) {
            var files = utools.showOpenDialog({
              filters: [{ name: '阅读文件', extensions: ['txt', 'epub', 'md', 'markdown'] }],
              properties: ['openFile']
            });
            if (files && files.length > 0) {
              var ext = files[0].split('.').pop().toLowerCase();
              self._openBook(files[0], ext);
            }
          }
        });
        document.getElementById('btn-open-url').addEventListener('click', function() {
          var url = prompt('请输入网址:');
          if (url && url.trim()) self._openUrl(url.trim());
        });
        var btnContinue = document.getElementById('btn-continue');
        var history = Storage.getReadingHistory();
        if (history.length > 0) {
          btnContinue.style.display = 'inline-block';
          btnContinue.textContent = '继续: ' + history[0].title;
          btnContinue.addEventListener('click', function() {
            self._openBook(history[0].filePath, history[0].format);
          });
        }
        document.getElementById('btn-settings').addEventListener('click', function() {
          self._showSettingsPanel();
        });
      },
      _loadRecentList: function() {
        var el = document.getElementById('recent-list');
        if (!el) return;
        var history = Storage.getReadingHistory();
        if (history.length === 0) return;
        var html = '<h3 style="margin-bottom:8px;font-size:14px;color:#999;">最近阅读</h3>';
        history.slice(0, 8).forEach(function(item) {
          html += '<div class="recent-item" data-path="' + item.filePath + '" data-format="' + item.format + '">';
          html += '<span>' + item.title + '</span>';
          html += '<span style="font-size:11px;color:#666;">' + new Date(item.lastRead).toLocaleDateString() + '</span>';
          html += '</div>';
        });
        el.innerHTML = html;
        el.querySelectorAll('.recent-item').forEach(function(item) {
          item.addEventListener('click', function() {
            App._openBook(this.dataset.path, this.dataset.format);
          });
        });
      },
      _showSettingsPanel: function() {
        var existing = document.querySelector('.settings-panel');
        if (existing) { existing.remove(); return; }
        var settings = Storage.getSettings();
        var panel = document.createElement('div');
        panel.className = 'settings-panel';
        panel.innerHTML =
          '<div class="settings-content">' +
          '<h3>阅读设置</h3>' +
          '<div class="setting-row"><label>默认字体大小</label><input type="range" id="set-fontsize" min="12" max="28" value="' + (settings.floatFontSize || 17) + '"><span id="set-fontsize-val">' + (settings.floatFontSize || 17) + '</span></div>' +
          '<div class="setting-row"><label>窗口宽度</label><input type="number" id="set-width" min="300" max="1200" step="20" value="' + (settings.floatWidth || 520) + '"></div>' +
          '<div class="setting-row"><label>窗口高度</label><input type="number" id="set-height" min="400" max="1400" step="20" value="' + (settings.floatHeight || 780) + '"></div>' +
          '<div class="setting-row"><label>鼠标动作</label><select id="set-mouse"><option value="doubleclick"' + (settings.mouseAction === 'doubleclick' ? ' selected' : '') + '>双击切换</option><option value="click"' + (settings.mouseAction === 'click' ? ' selected' : '') + '>单击切换</option><option value="none"' + (settings.mouseAction === 'none' ? ' selected' : '') + '>无</option></select></div>' +
          '<div class="setting-actions"><button id="set-save">保存</button><button id="set-close">关闭</button></div>' +
          '</div>';
        document.body.appendChild(panel);
        document.getElementById('set-fontsize').addEventListener('input', function() {
          document.getElementById('set-fontsize-val').textContent = this.value;
        });
        document.getElementById('set-save').addEventListener('click', function() {
          settings.floatFontSize = parseInt(document.getElementById('set-fontsize').value);
          settings.floatWidth = parseInt(document.getElementById('set-width').value);
          settings.floatHeight = parseInt(document.getElementById('set-height').value);
          settings.mouseAction = document.getElementById('set-mouse').value;
          Storage.saveSettings(settings);
          panel.remove();
        });
        document.getElementById('set-close').addEventListener('click', function() { panel.remove(); });
      }
    };
    document.addEventListener('DOMContentLoaded', function() { App.init(); });
  </script>
</body>
</html>
